name: Deploy Eleventy to XMIT
on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      site:
        description: "XMIT Target Site"
        required: true
        default: "thewhitestonefoundation.xmit.dev@268"
        type: string
concurrency:
  group: deploy-xmit-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      XMIT_SITE: thewhitestonefoundation.xmit.dev@268
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: node scripts/merge-metasearch.js
      - name: Git Push Metadata
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add content/page-setup/global-metasearch.json || exit 0
          git commit -m "chore: update metasearch [skip ci]" || exit 0
          git push
      - run: npm run build
      - name: XMIT Deploy
        env:
          XMIT_KEY: ${{ secrets.XMIT_KEY }}
        run: |
          SITE="${{ github.event_name == 'workflow_dispatch' && inputs.site || env.XMIT_SITE }}"
          npx -y @xmit.co/xmit "$SITE" _site